<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — The Jewel Nest Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 2.5rem;
      padding: 3rem 0;
    }
    .cart-row {
      display: grid;
      grid-template-columns: 100px 1fr auto auto auto;
      gap: 1.25rem;
      align-items: center;
      padding: 1.25rem;
      background: #fff;
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      border: 1px solid var(--line);
    }
    .cart-row img {
      width: 100px; height: 100px; object-fit: cover;
      border-radius: var(--radius);
    }
    .cart-row-info h4 { font-family: var(--serif); font-size: 1.1rem; margin-bottom: .25rem; }
    .cart-row-info .muted { color: var(--muted); font-size: .85rem; }
    .qty-control {
      display: flex; align-items: center;
      border: 1px solid var(--line); border-radius: var(--radius);
    }
    .qty-control button {
      width: 32px; height: 36px; background: transparent;
      border: none; cursor: pointer; font-size: 1.1rem;
    }
    .qty-control input {
      width: 50px; height: 36px; text-align: center;
      border: none; border-left: 1px solid var(--line);
      border-right: 1px solid var(--line); -moz-appearance: textfield;
    }
    .qty-control input::-webkit-outer-spin-button,
    .qty-control input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .line-total { font-weight: 600; color: var(--gold-deep); min-width: 80px; text-align: right; }
    .remove-btn {
      background: transparent; border: none; font-size: 1.5rem;
      color: var(--muted); cursor: pointer;
    }
    .remove-btn:hover { color: var(--error); }

    .cart-summary {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      align-self: start;
      position: sticky;
      top: calc(var(--header-h) + 1rem);
    }
    .cart-summary h3 { margin-bottom: 1rem; }
    .cart-summary .row {
      display: flex; justify-content: space-between;
      padding: .5rem 0;
    }
    .cart-summary .muted { color: var(--muted); }
    .cart-summary .total {
      font-weight: 600; font-size: 1.15rem; padding: 1rem 0;
      border-top: 1px solid var(--line); margin-top: .5rem;
    }
    .cart-summary .btn-block { margin-top: 1rem; }
    @media (max-width: 800px) {
      .cart-grid { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem 0; }
      .cart-row { grid-template-columns: 80px 1fr auto; }
      .cart-row .qty-control, .cart-row .line-total { grid-column: 2 / 4; justify-self: start; }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>
  <main class="container">
    <h1 style="padding-top:2.5rem">Your Cart</h1>
    <div id="cart-root"></div>
  </main>
  <div id="footer-slot"></div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
