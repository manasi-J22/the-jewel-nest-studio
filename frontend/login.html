<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — The Jewel Nest Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="header-slot"></div>

  <div class="auth-wrap">
    <div class="auth-art">
      <div>
        <h2>Welcome back to The Jewel Nest Studio.</h2>
        <p>Your saved pieces and order history are waiting.</p>
      </div>
    </div>
    <div class="auth-form-wrap">
      <form class="auth-form" id="login-form">
        <h1>Sign in</h1>
        <p class="sub">Enter your details to continue.</p>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="error-text" id="form-error"></div>
        <button type="submit" class="btn btn-block">Sign In</button>
        <div class="swap">New customer? <a href="register.html">Create an account</a></div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => renderHeader());</script>
  <script src="js/auth.js"></script>
</body>
</html>
