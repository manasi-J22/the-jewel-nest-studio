<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — The Jewel Nest Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      padding: 3rem 0;
    }
    .pd-img {
      background: var(--gold-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 1;
    }
    .pd-img img { width: 100%; height: 100%; object-fit: cover; }
    .pd-info .cat {
      font-size: .75rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--muted); margin-bottom: .75rem;
    }
    .pd-info h1 { margin-bottom: 1rem; }
    .rating-line {
      color: var(--gold-deep); font-weight: 600;
      margin-bottom: 1rem; font-size: .95rem;
    }
    .rating-line span { color: var(--muted); font-weight: 400; }
    .pd-price {
      font-family: var(--serif); font-size: 2rem;
      color: var(--gold-deep); margin: 1rem 0 1.5rem;
    }
    .pd-info .meta { color: var(--ink-soft); margin-bottom: .75rem; font-size: .9rem; }
    .pd-desc { color: var(--ink-soft); line-height: 1.7; margin-bottom: 1.5rem; }
    .pd-stock { font-size: .85rem; margin-bottom: 1.5rem; }
    .pd-stock.ok  { color: var(--success); }
    .pd-stock.out { color: var(--error); }
    .pd-actions {
      display: flex; gap: 1rem; align-items: center;
    }
    .pd-actions input {
      width: 80px; padding: .85rem .6rem; border: 1px solid var(--line);
      border-radius: var(--radius); text-align: center; font-size: 1rem;
    }
    .pd-reviews { padding: 3rem 0; border-top: 1px solid var(--line); }
    .pd-reviews h2 { margin-bottom: 2rem; }
    .review {
      padding: 1.25rem 0; border-bottom: 1px solid var(--line);
    }
    .review-head {
      display: flex; gap: 1rem; align-items: center; margin-bottom: .5rem;
    }
    .review-head .stars { color: var(--gold); }
    .review-head .date  { color: var(--muted); font-size: .8rem; margin-left: auto; }
    .review-form {
      background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg);
      padding: 1.5rem; margin-bottom: 2rem;
    }
    .review-form h3 { margin-bottom: 1rem; }
    .stars-input { display: flex; gap: .25rem; margin-bottom: 1rem; }
    .stars-input button {
      background: transparent; border: none; cursor: pointer;
      font-size: 1.6rem; color: var(--gold);
    }
    .login-hint {
      background: var(--gold-soft); padding: 1rem; border-radius: var(--radius);
      text-align: center; margin-bottom: 1.5rem;
    }
    .login-hint a { color: var(--gold-deep); font-weight: 600; }
    @media (max-width: 800px) { .pd-grid { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem 0; } }
  </style>
</head>
<body>
  <div id="header-slot"></div>
  <main class="container" id="pd-root"></main>
  <div id="footer-slot"></div>
  <script src="js/api.js"></script>
  <script src="js/product-details.js"></script>
</body>
</html>
