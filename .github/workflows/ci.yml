name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint + smoke test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jewelry_store
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: jewelry_store
      SECRET_KEY: ci-secret
      CORS_ORIGIN: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"; exit 0
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done
          echo "MySQL did not become ready"; exit 1

      - name: Seed database
        working-directory: backend
        run: python seed.py

      - name: Smoke test API + login
        working-directory: backend
        run: |
          python app.py &
          APP_PID=$!
          # Wait for /api/health
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/api/health >/dev/null; then
              echo "API is up"; break
            fi
            sleep 1
          done

          echo "Health check:"
          curl -fsS http://127.0.0.1:5000/api/health

          echo "Login as seeded admin:"
          STATUS=$(curl -s -o /tmp/login.json -w "%{http_code}" \
            -X POST http://127.0.0.1:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@jewel.com","password":"Admin@123"}')
          cat /tmp/login.json
          if [ "$STATUS" != "200" ]; then
            echo "Login failed with HTTP $STATUS"; kill $APP_PID; exit 1
          fi

          echo "Static frontend served by Flask:"
          curl -fsS http://127.0.0.1:5000/login.html | head -n 5

          kill $APP_PID

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: the-jewel-nest-studio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot the image and hit /api/health
        run: |
          docker run -d --name app -p 5000:5000 \
            -e DB_HOST=skip -e SECRET_KEY=ci \
            the-jewel-nest-studio:ci || true
          # The DB pool will fail to init (no DB) but the web server should
          # still respond on /api/health, which doesn't touch the DB.
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5000/api/health >/dev/null; then
              echo "Image health OK"; docker rm -f app; exit 0
            fi
            sleep 2
          done
          echo "Image did not respond to /api/health"
          docker logs app
          docker rm -f app
          exit 1
